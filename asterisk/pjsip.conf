; ── Transports ───────────────────────────────────────────────────────────────

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
local_net=192.168.1.0/24
external_media_address=192.168.1.6
external_signaling_address=192.168.1.6

[transport-ws]
type=transport
protocol=ws
bind=0.0.0.0:8088

; ── citofono — Linphone desktop / DH-SB-86 fisico (UDP) ──────────────────────
; NOTA: in pjsip endpoint + auth + aor devono condividere lo stesso nome

[citofono]
type=endpoint
context=doorbell
disallow=all
allow=ulaw
allow=alaw
auth=citofono
aors=citofono
direct_media=no
force_rport=yes
rtp_symmetric=yes
rewrite_contact=yes
ice_support=no

[citofono]
type=auth
auth_type=userpass
username=citofono
password=citofono123

[citofono]
type=aor
max_contacts=1
remove_existing=yes
qualify_frequency=30

; ── webapp — JsSIP nel browser (WebSocket + WebRTC + DTLS-SRTP) ──────────────

[webapp]
type=endpoint
context=doorbell
disallow=all
allow=ulaw
allow=alaw
auth=webapp
aors=webapp
; WebRTC / DTLS-SRTP
media_encryption=dtls
dtls_verify=no
dtls_cert_file=/etc/asterisk/keys/asterisk.pem
dtls_private_key=/etc/asterisk/keys/asterisk.pem
dtls_setup=actpass
; ICE
ice_support=yes
media_use_received_transport=yes
rtcp_mux=yes
use_avpf=yes
; NAT/media
direct_media=no
force_rport=yes
rtp_symmetric=yes
rewrite_contact=yes

[webapp]
type=auth
auth_type=userpass
username=webapp
password=webapp123

[webapp]
type=aor
max_contacts=2
remove_existing=yes
qualify_frequency=30
