[general]
static=yes
writeprotect=no

[default]
exten => s,1,Hangup()

[doorbell]
; ── AMI originate (backend → ring-all) ──────────────────────────────────────
; Suona webapp (JsSIP browser) + citofono (Linphone/DH-SB-86) simultaneamente.
; Chiunque risponde viene connesso all'altro lato.
; Se citofono non è registrato, Dial lo skippa silenziosamente.
exten => ring-all,1,NoOp(Ring doorbell: webapp + citofono)
 same => n,Dial(PJSIP/webapp&PJSIP/citofono,30,tr)
 same => n,Hangup()

; ── Produzione: DH-SB-86 chiama webapp direttamente ─────────────────────────
exten => webapp,1,NoOp(citofono -> webapp)
 same => n,Dial(PJSIP/webapp,30,tr)
 same => n,Hangup()

; ── Test: webapp chiama citofono ─────────────────────────────────────────────
exten => citofono,1,NoOp(webapp -> citofono)
 same => n,Dial(PJSIP/citofono,30,tr)
 same => n,Hangup()

exten => _X.,1,Hangup()
