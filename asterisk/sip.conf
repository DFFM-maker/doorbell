[general]
context=default
allowguest=no
allowoverlap=no
bindport=5060
bindaddr=0.0.0.0
transport=udp
nat=force_rport,comedia
directmedia=no
qualify=yes
alwaysauthreject=yes

; WebSocket/WebRTC support
websocket_enabled=yes

[citofono]
type=friend
secret=citofono123
context=doorbell
host=dynamic
transport=udp
dtmfmode=rfc2833
disallow=all
allow=ulaw
allow=alaw
nat=force_rport,comedia
qualify=yes

[webapp]
type=friend
secret=webapp123
context=doorbell
host=dynamic
transport=ws
dtmfmode=rfc2833
disallow=all
allow=ulaw
allow=alaw
avpf=yes
icesupport=yes
encryption=yes
dtlsenable=yes
dtlsverify=no
dtlscertfile=/etc/asterisk/keys/asterisk.pem
dtlsprivatekey=/etc/asterisk/keys/asterisk.pem
dtlscafile=/etc/asterisk/keys/asterisk.pem
dtlssetup=actpass
nat=force_rport,comedia
qualify=no
